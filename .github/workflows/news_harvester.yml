name: 📰 News Harvester

on:
  schedule:
    - cron: '0 */12 * * *' # Se ejecuta cada 12 horas
  workflow_dispatch:       # Te permite ejecutarlo manualmente

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Ejecutar Extractor de Noticias
        run: python scripts/update_news.py

      - name: 💾 Commit y Push de Noticias
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚡ Auto-Update: Últimas noticias sincronizadas"
          file_pattern: data/news.json
